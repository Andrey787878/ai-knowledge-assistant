[defaults]
private_key_file       = ~/.ssh/ansible_deploy
inventory              = ./inventories/cloud/hosts.yml
roles_path             = ./roles
host_key_checking      = False
retry_files_enabled    = False
forks                  = 10
timeout                = 30
interpreter_python     = auto_silent

[privilege_escalation]
become                 = True
become_method          = sudo
become_ask_pass        = False
