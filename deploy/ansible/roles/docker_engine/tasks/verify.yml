---
- name: Verify docker binary
  ansible.builtin.command: docker --version
  register: docker_engine_version
  changed_when: false
  failed_when: false
  when: not ansible_check_mode

- name: Verify docker version command succeeded
  ansible.builtin.assert:
    that:
      - docker_engine_version.rc == 0
    fail_msg: "docker --version failed with rc={{ docker_engine_version.rc }}"
  when: not ansible_check_mode

- name: Verify docker version output is not empty
  ansible.builtin.assert:
    that:
      - docker_engine_version.stdout | trim | length > 0
    fail_msg: "docker --version returned empty output"
  when: not ansible_check_mode

- name: Verify docker compose plugin
  ansible.builtin.command: docker compose version
  register: docker_compose_version
  changed_when: false
  failed_when: false
  when: not ansible_check_mode

- name: Verify docker compose command succeeded
  ansible.builtin.assert:
    that:
      - docker_compose_version.rc == 0
    fail_msg: "docker compose version failed with rc={{ docker_compose_version.rc }}"
  when: not ansible_check_mode

- name: Verify docker compose version output is not empty
  ansible.builtin.assert:
    that:
      - docker_compose_version.stdout | trim | length > 0
    fail_msg: "docker compose version returned empty output"
  when: not ansible_check_mode

- name: Get docker service enabled state
  ansible.builtin.command: systemctl is-enabled docker
  register: docker_service_enabled
  changed_when: false
  failed_when: false
  when: not ansible_check_mode

- name: Verify docker service enabled state
  ansible.builtin.assert:
    that:
      - docker_service_enabled.stdout | trim in ["enabled", "enabled-runtime"]
    fail_msg: "Docker service must be enabled (enabled/enabled-runtime) but current state is {{ docker_service_enabled.stdout | trim }}"
  when:
    - not ansible_check_mode
    - docker_engine_service_enabled | bool

- name: Verify docker service disabled state
  ansible.builtin.assert:
    that:
      - docker_service_enabled.stdout | trim != "enabled"
    fail_msg: "Docker service must not be enabled but current state is {{ docker_service_enabled.stdout | trim }}"
  when:
    - not ansible_check_mode
    - not (docker_engine_service_enabled | bool)

- name: Get docker service active state
  ansible.builtin.command: systemctl is-active docker
  register: docker_service_active
  changed_when: false
  failed_when: false
  when: not ansible_check_mode

- name: Verify docker service active state
  ansible.builtin.assert:
    that:
      - docker_service_active.stdout | trim == "active"
    fail_msg: "Docker service must be active for state {{ docker_engine_service_state }}, current state is {{ docker_service_active.stdout | trim }}"
  when:
    - not ansible_check_mode
    - docker_engine_service_state in ["started", "restarted", "reloaded"]

- name: Verify docker daemon responds
  ansible.builtin.command:
    argv:
      - docker
      - info
      - --format
      - "{{ '{{.ServerVersion}}' }}"
  register: docker_engine_server_version
  changed_when: false
  failed_when: false
  when:
    - not ansible_check_mode
    - docker_engine_service_state in ["started", "restarted", "reloaded"]

- name: Verify docker daemon command succeeded
  ansible.builtin.assert:
    that:
      - docker_engine_server_version.rc == 0
    fail_msg: "docker info failed with rc={{ docker_engine_server_version.rc }}"
  when:
    - not ansible_check_mode
    - docker_engine_service_state in ["started", "restarted", "reloaded"]

- name: Verify docker daemon version output is not empty
  ansible.builtin.assert:
    that:
      - docker_engine_server_version.stdout | trim | length > 0
    fail_msg: "docker info returned empty server version output"
  when:
    - not ansible_check_mode
    - docker_engine_service_state in ["started", "restarted", "reloaded"]

- name: Verify docker service inactive state
  ansible.builtin.assert:
    that:
      - docker_service_active.stdout | trim in ["inactive", "failed", "deactivating"]
    fail_msg: "Docker service must be inactive for state {{ docker_engine_service_state }}, current state is {{ docker_service_active.stdout | trim }}"
  when:
    - not ansible_check_mode
    - docker_engine_service_state == "stopped"
