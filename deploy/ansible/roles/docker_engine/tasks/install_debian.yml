---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
    lock_timeout: "{{ docker_engine_apt_lock_timeout }}"

- name: Remove conflicting Docker packages
  ansible.builtin.apt:
    name: "{{ docker_engine_conflicting_packages_debian }}"
    state: absent
    lock_timeout: "{{ docker_engine_apt_lock_timeout }}"

- name: Ensure Docker keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Download Docker repository GPG key
  ansible.builtin.get_url:
    url: "{{ docker_engine_gpg_key_url }}"
    dest: "{{ docker_engine_gpg_key_path_debian }}"
    owner: root
    group: root
    mode: "0644"
    checksum: "{{ docker_engine_gpg_key_checksum if docker_engine_gpg_key_checksum | trim | length > 0 else omit }}"

- name: Read Docker repository GPG fingerprint
  ansible.builtin.command: "gpg --batch --show-keys --with-colons {{ docker_engine_gpg_key_path_debian }}"
  register: docker_engine_gpg_key_info
  changed_when: false

- name: Extract downloaded Docker GPG fingerprint
  ansible.builtin.set_fact:
    docker_engine_downloaded_gpg_fingerprint: >-
      {{
        (
          docker_engine_gpg_key_info.stdout
          | regex_findall('(?im)^fpr:+([0-9a-f]{40}):$')
          | first
          | default('')
        )
        | upper
      }}
  changed_when: false

- name: Assert downloaded Docker GPG fingerprint was parsed
  ansible.builtin.assert:
    that:
      - docker_engine_downloaded_gpg_fingerprint | length == 40
    fail_msg: "Could not parse Docker GPG fingerprint from {{ docker_engine_gpg_key_path_debian }}"

- name: Validate downloaded Docker GPG fingerprint
  ansible.builtin.assert:
    that:
      - docker_engine_downloaded_gpg_fingerprint == (docker_engine_gpg_fingerprint | upper)
    fail_msg: "Docker GPG fingerprint validation failed for {{ docker_engine_gpg_key_path_debian }}"

- name: Configure Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ docker_engine_architecture_debian }} signed-by={{ docker_engine_gpg_key_path_debian }}]
      {{ docker_engine_repo_base_url }}/{{ docker_engine_distribution }}
      {{ docker_engine_codename }} {{ docker_engine_repo_component }}
    filename: docker
    state: present

- name: Install Docker Engine packages
  ansible.builtin.apt:
    name: "{{ docker_engine_packages }}"
    state: present
    update_cache: true
    lock_timeout: "{{ docker_engine_apt_lock_timeout }}"
