---
- name: Ensure docker group exists
  ansible.builtin.group:
    name: docker
    state: present

- name: Ensure Docker service is enabled and started
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started

- name: Add deployment user to docker group
  ansible.builtin.user:
    name: '{{ docker_engine_group_user }}'
    groups: docker
    append: true
  when:
    - docker_engine_manage_user_group | bool
    - docker_engine_group_user | trim | length > 0
