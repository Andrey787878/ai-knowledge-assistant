---
docker_engine_supported_os_families:
  - Debian

docker_engine_distribution_map:
  Ubuntu: ubuntu
  Debian: debian

docker_engine_arch_map:
  x86_64: amd64
  aarch64: arm64

docker_engine_distribution: '{{ docker_engine_distribution_map.get(ansible_distribution, ansible_distribution | lower) }}'
docker_engine_architecture: '{{ docker_engine_arch_map.get(ansible_architecture, ansible_architecture) }}'
docker_engine_codename: '{{ ansible_distribution_release }}'
docker_engine_repo_component: stable
docker_engine_repo_base_url: https://download.docker.com/linux

docker_engine_gpg_key_url: '{{ docker_engine_repo_base_url }}/{{ docker_engine_distribution }}/gpg'
docker_engine_gpg_key_path: /etc/apt/keyrings/docker.asc
# Официальный fingerprint Docker apt key.
docker_engine_gpg_fingerprint: '9DC858229FC7DD38854AE2D88D81803C0EBFCD88'
# Опционально: "sha256:<digest>" для строгой проверки ключа на этапе get_url.
docker_engine_gpg_key_checksum: ''

docker_engine_prerequisite_packages:
  - ca-certificates
  - curl
  - gnupg

docker_engine_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

docker_engine_manage_user_group: true
docker_engine_group_user: "{{ ansible_user | default('') }}"

docker_engine_validate_installation: true
