---
- name: Validate supported OS family
  ansible.builtin.assert:
    that:
      - ansible_os_family in nginx_rp_supported_os_families
    fail_msg: "Unsupported OS family for nginx_reverse_proxy role: {{ ansible_os_family }}"
  tags: [nginx_rp, nginx_rp_validate]

- name: Validate required nginx reverse proxy variables
  ansible.builtin.assert:
    that:
      - nginx_rp_package_name | trim | length > 0
      - nginx_rp_service_name | trim | length > 0
      - nginx_rp_service_enabled is boolean
      - nginx_rp_service_state in ['started', 'stopped', 'restarted', 'reloaded']
      - nginx_rp_conf_dir | trim | length > 0
      - nginx_rp_n8n_conf_path | trim | length > 0
      - nginx_rp_wiki_conf_path | trim | length > 0
      - nginx_rp_http_port | int > 0
      - nginx_rp_http_port | int < 65536
      - nginx_rp_https_port | int > 0
      - nginx_rp_https_port | int < 65536
      - nginx_rp_wiki_host | trim | length > 0
      - nginx_rp_wiki_port | int > 0
      - nginx_rp_wiki_port | int < 65536
      - nginx_rp_wiki_server_name | trim | length > 0
      - nginx_rp_n8n_host | trim | length > 0
      - nginx_rp_n8n_port | int > 0
      - nginx_rp_n8n_port | int < 65536
      - nginx_rp_n8n_server_name | trim | length > 0
      - nginx_rp_tls_cert_path | trim | length > 0
      - nginx_rp_tls_key_path | trim | length > 0
      - nginx_rp_client_max_body_size | trim | length > 0
      - nginx_rp_proxy_connect_timeout | trim | length > 0
      - nginx_rp_proxy_send_timeout | trim | length > 0
      - nginx_rp_proxy_read_timeout | trim | length > 0
      - nginx_rp_n8n_proxy_connect_timeout | trim | length > 0
      - nginx_rp_n8n_proxy_send_timeout | trim | length > 0
      - nginx_rp_n8n_proxy_read_timeout | trim | length > 0
      - nginx_rp_hsts_max_age | int > 0
      - nginx_rp_hsts_include_subdomains is boolean
      - nginx_rp_remove_default_site is boolean
      - nginx_rp_default_conf_paths is iterable
      - nginx_rp_verify_enabled is boolean
      - nginx_rp_verify_https_validate_certs is boolean
      - nginx_rp_verify_local_host | trim | length > 0
    fail_msg: "nginx_reverse_proxy role validation failed: check variables in defaults/host_vars."
  tags: [nginx_rp, nginx_rp_validate]

- name: Validate verify precondition for service state
  ansible.builtin.assert:
    that:
      - nginx_rp_service_state in ['started', 'restarted', 'reloaded']
    fail_msg: "nginx_rp_verify_enabled requires nginx_rp_service_state to be started/restarted/reloaded."
  when: nginx_rp_verify_enabled | bool
  tags: [nginx_rp, nginx_rp_validate]

- name: Check TLS certificate file exists
  ansible.builtin.stat:
    path: "{{ nginx_rp_tls_cert_path }}"
  register: nginx_rp_tls_cert_stat
  tags: [nginx_rp, nginx_rp_validate]

- name: Check TLS private key file exists
  ansible.builtin.stat:
    path: "{{ nginx_rp_tls_key_path }}"
  register: nginx_rp_tls_key_stat
  tags: [nginx_rp, nginx_rp_validate]

- name: Assert TLS cert and key are present
  ansible.builtin.assert:
    that:
      - nginx_rp_tls_cert_stat.stat.exists
      - nginx_rp_tls_key_stat.stat.exists
    fail_msg: "TLS certificate or key file is missing on target host."
  tags: [nginx_rp, nginx_rp_validate]
