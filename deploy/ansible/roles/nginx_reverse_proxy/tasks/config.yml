---
- name: Ensure nginx conf.d directory exists
  ansible.builtin.file:
    path: "{{ nginx_rp_conf_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [nginx_rp, nginx_rp_config]

- name: Remove default nginx config files when enabled
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ nginx_rp_default_conf_paths }}"
  when:
    - nginx_rp_remove_default_site | bool
  notify: Reload nginx
  tags: [nginx_rp, nginx_rp_config]

- name: Render n8n reverse proxy config
  ansible.builtin.template:
    src: n8n.conf.j2
    dest: "{{ nginx_rp_n8n_conf_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx
  tags: [nginx_rp, nginx_rp_config]

- name: Render wiki reverse proxy config
  ansible.builtin.template:
    src: wiki.conf.j2
    dest: "{{ nginx_rp_wiki_conf_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx
  tags: [nginx_rp, nginx_rp_config]

- name: Validate nginx configuration syntax
  ansible.builtin.command: nginx -t
  register: nginx_rp_nginx_test
  changed_when: false
  when: not ansible_check_mode
  tags: [nginx_rp, nginx_rp_config]

- name: Assert nginx syntax check succeeded
  ansible.builtin.assert:
    that:
      - nginx_rp_nginx_test.rc == 0
    fail_msg: "nginx -t failed. Check rendered config files."
  when: not ansible_check_mode
  tags: [nginx_rp, nginx_rp_config]
