---
nginx_rp_supported_os_families:
  - Debian
  - RedHat

nginx_rp_package_name: nginx
nginx_rp_service_name: nginx
nginx_rp_service_enabled: true
nginx_rp_service_state: started
nginx_rp_conf_dir: /etc/nginx/conf.d
nginx_rp_n8n_conf_path: "{{ nginx_rp_conf_dir }}/n8n.conf"
nginx_rp_wiki_conf_path: "{{ nginx_rp_conf_dir }}/wiki.conf"
nginx_rp_remove_default_site: true
nginx_rp_default_conf_paths:
  - /etc/nginx/sites-enabled/default
  - /etc/nginx/conf.d/default.conf

# Wiki upstream
nginx_rp_wiki_host: 127.0.0.1
nginx_rp_wiki_port: 3000
nginx_rp_wiki_server_name: wiki.example.com

# n8n upstream
nginx_rp_n8n_host: 127.0.0.1
nginx_rp_n8n_port: 5678
nginx_rp_n8n_server_name: n8n.example.com

# Public listen ports
nginx_rp_http_port: 80
nginx_rp_https_port: 443

# TLS certificates on edge host
nginx_rp_tls_cert_path: /etc/nginx/tls/fullchain.pem
nginx_rp_tls_key_path: /etc/nginx/tls/privkey.pem

# Proxy behavior
nginx_rp_client_max_body_size: 50m
nginx_rp_proxy_connect_timeout: 30s
nginx_rp_proxy_send_timeout: 60s
nginx_rp_proxy_read_timeout: 60s

# n8n usually needs longer reads for editor/API streams.
nginx_rp_n8n_proxy_connect_timeout: 30s
nginx_rp_n8n_proxy_send_timeout: 120s
nginx_rp_n8n_proxy_read_timeout: 3600s

# Optional hardening
nginx_rp_hsts_max_age: 31536000
nginx_rp_hsts_include_subdomains: false

# Verify behavior
nginx_rp_verify_enabled: true
nginx_rp_verify_local_host: 127.0.0.1
nginx_rp_verify_https_validate_certs: false
