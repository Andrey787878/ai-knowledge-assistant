---
- name: Ensure HTTP-01 webroot directory exists
  ansible.builtin.file:
    path: "{{ edge_tls_acme_webroot_path }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [edge_tls_acme, edge_tls_acme_issue]

- name: Ensure ACME challenge directory exists
  ansible.builtin.file:
    path: "{{ edge_tls_acme_webroot_path }}/.well-known/acme-challenge"
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [edge_tls_acme, edge_tls_acme_issue]

- name: Create temporary ACME probe file
  ansible.builtin.copy:
    dest: "{{ edge_tls_acme_webroot_path }}/.well-known/acme-challenge/ansible-probe"
    content: "ok\n"
    owner: root
    group: root
    mode: "0644"
  tags: [edge_tls_acme, edge_tls_acme_issue]

- name: Verify ACME challenge path is served by nginx for each domain
  ansible.builtin.uri:
    url: "http://127.0.0.1/.well-known/acme-challenge/ansible-probe"
    method: GET
    headers:
      Host: "{{ item }}"
    status_code: 200
    return_content: true
  register: edge_tls_acme_challenge_probe
  changed_when: false
  failed_when: >-
    edge_tls_acme_challenge_probe.status != 200
    or (edge_tls_acme_challenge_probe.content | trim) != 'ok'
  loop: "{{ edge_tls_acme_requested_domains }}"
  loop_control:
    label: "{{ item }}"
  when: not ansible_check_mode
  tags: [edge_tls_acme, edge_tls_acme_issue]

- name: Build certbot base argv for HTTP-01 webroot issuance
  ansible.builtin.set_fact:
    edge_tls_acme_certbot_argv:
      - certbot
      - certonly
      - --non-interactive
      - --agree-tos
      - --email
      - "{{ edge_tls_acme_email }}"
      - --webroot
      - --webroot-path
      - "{{ edge_tls_acme_webroot_path }}"
      - --keep-until-expiring
  changed_when: false
  tags: [edge_tls_acme, edge_tls_acme_issue]

- name: Append staging flag when enabled
  ansible.builtin.set_fact:
    edge_tls_acme_certbot_argv: "{{ edge_tls_acme_certbot_argv + ['--staging'] }}"
  changed_when: false
  when: edge_tls_acme_use_staging | bool
  tags: [edge_tls_acme, edge_tls_acme_issue]

- name: Append force-renewal flag when enabled
  ansible.builtin.set_fact:
    edge_tls_acme_certbot_argv: "{{ edge_tls_acme_certbot_argv + ['--force-renewal'] }}"
  changed_when: false
  when: edge_tls_acme_force_renew | bool
  tags: [edge_tls_acme, edge_tls_acme_issue]

- name: Append requested domain arguments to certbot argv
  ansible.builtin.set_fact:
    edge_tls_acme_certbot_argv: "{{ edge_tls_acme_certbot_argv + ['-d', item] }}"
  loop: "{{ edge_tls_acme_requested_domains }}"
  loop_control:
    label: "{{ item }}"
  changed_when: false
  tags: [edge_tls_acme, edge_tls_acme_issue]

- name: Issue or renew edge Let's Encrypt certificate (HTTP-01 webroot)
  ansible.builtin.command:
    argv: "{{ edge_tls_acme_certbot_argv }}"
  register: edge_tls_acme_certbot_issue
  changed_when: >-
    (
      'not yet due for renewal' not in (((edge_tls_acme_certbot_issue.stdout | default('')) ~ '\n' ~ (edge_tls_acme_certbot_issue.stderr | default(''))) | lower)
      and
      'no renewals were attempted' not in (((edge_tls_acme_certbot_issue.stdout | default('')) ~ '\n' ~ (edge_tls_acme_certbot_issue.stderr | default(''))) | lower)
    )
  notify: Reload edge nginx after certificate update
  tags: [edge_tls_acme, edge_tls_acme_issue]

- name: Ensure certbot deploy hook directory exists
  ansible.builtin.file:
    path: "{{ edge_tls_acme_renew_hook_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: edge_tls_acme_manage_renew_hook | bool
  tags: [edge_tls_acme, edge_tls_acme_issue]

- name: Render nginx reload renew hook
  ansible.builtin.template:
    src: reload-nginx-hook.sh.j2
    dest: "{{ edge_tls_acme_renew_hook_path }}"
    owner: root
    group: root
    mode: "0755"
  when: edge_tls_acme_manage_renew_hook | bool
  tags: [edge_tls_acme, edge_tls_acme_issue]

- name: Check LE certificate file exists
  ansible.builtin.stat:
    path: "{{ edge_tls_acme_cert_path }}"
  register: edge_tls_acme_cert_stat
  tags: [edge_tls_acme, edge_tls_acme_issue]

- name: Check LE private key file exists
  ansible.builtin.stat:
    path: "{{ edge_tls_acme_key_path }}"
  register: edge_tls_acme_key_stat
  tags: [edge_tls_acme, edge_tls_acme_issue]

- name: Assert LE certificate and key are present
  ansible.builtin.assert:
    that:
      - edge_tls_acme_cert_stat.stat.exists
      - edge_tls_acme_key_stat.stat.exists
    fail_msg: "Let's Encrypt certificate or key is missing after issuance."
  tags: [edge_tls_acme, edge_tls_acme_issue]

- name: Verify certbot renew dry-run succeeds
  ansible.builtin.command:
    argv:
      - certbot
      - renew
      - --dry-run
  register: edge_tls_acme_renew_dry_run
  changed_when: false
  when: not ansible_check_mode
  tags: [edge_tls_acme, edge_tls_acme_issue]

- name: Sync nginx TLS variables to LE certificate paths
  ansible.builtin.set_fact:
    nginx_rp_tls_cert_path: "{{ edge_tls_acme_cert_path }}"
    nginx_rp_tls_key_path: "{{ edge_tls_acme_key_path }}"
    nginx_rp_verify_ca_cert_path: "{{ edge_tls_acme_system_ca_bundle_path }}"
  when: edge_tls_acme_sync_nginx_vars | bool
  tags: [edge_tls_acme, edge_tls_acme_issue]

- name: Remove temporary ACME probe file
  ansible.builtin.file:
    path: "{{ edge_tls_acme_webroot_path }}/.well-known/acme-challenge/ansible-probe"
    state: absent
  tags: [edge_tls_acme, edge_tls_acme_issue]
