---
- name: Apply wikijs stack changes
  community.docker.docker_compose_v2:
    project_src: '{{ wikijs_stack_project_dir }}'
    state: present
    wait: '{{ wikijs_stack_compose_wait }}'
    wait_timeout: '{{ wikijs_stack_compose_wait_timeout }}'
  listen: Apply wikijs stack changes
  when: not (wikijs_deploy_executed | default(false) | bool)
  tags: [wikijs, wikijs_handlers]
