---
# stack filesystem layout
n8n_stack_project_dir: /opt/ai-agent/n8n
n8n_stack_config_dir: '{{ n8n_stack_project_dir }}/config'
n8n_stack_data_dir: '{{ n8n_stack_project_dir }}/data'
n8n_stack_redis_data_dir: '{{ n8n_stack_project_dir }}/redis'
n8n_stack_compose_file_path: '{{ n8n_stack_project_dir }}/docker-compose.yml'
n8n_stack_project_dir_owner: root
n8n_stack_project_dir_group: root
n8n_stack_project_dir_mode: '0755'
n8n_stack_config_dir_owner: root
n8n_stack_config_dir_group: root
n8n_stack_config_dir_mode: '0755'
# Runtime data dirs are intentionally configurable because container uid/gid can differ between image versions or custom builds
n8n_stack_data_dir_owner: '1000'
n8n_stack_data_dir_group: '1000'
n8n_stack_data_dir_mode: '0750'
n8n_stack_redis_data_dir_owner: '999'
n8n_stack_redis_data_dir_group: '999'
n8n_stack_redis_data_dir_mode: '0750'

# n8n common runtime (shared by web and worker)
n8n_common_image_repository: n8nio/n8n
n8n_common_image_tag: stable
n8n_common_image_digest: 'sha256:1e764de257f2b1eb6fc0e2477bd82cf8f5de9e68b82ac243b1a2db1551426723'
n8n_common_image: '{{ n8n_common_image_repository }}:{{ n8n_common_image_tag }}@{{ n8n_common_image_digest }}'
n8n_common_restart_policy: unless-stopped
n8n_common_env_file_path: '{{ n8n_stack_config_dir }}/n8n.env'
n8n_common_data_dir: '{{ n8n_stack_data_dir }}'
n8n_common_container_data_dir: /home/node/.n8n
n8n_common_healthcheck_interval: 15s
n8n_common_healthcheck_timeout: 5s
n8n_common_healthcheck_retries: 20
n8n_common_healthcheck_start_period: 30s

# n8n shared app config (used by web and worker)
n8n_common_executions_mode: queue
n8n_common_timezone: UTC
n8n_common_telemetry_enabled: false
n8n_common_editor_base_url: '{{ n8n_public_base_url }}'
n8n_common_webhook_url: '{{ n8n_public_base_url }}'
n8n_common_internal_webhook_base_url: 'http://{{ n8n_web_container_name }}:{{ n8n_web_container_port }}'
n8n_common_encryption_key: ''
n8n_common_ollama_base_url: ''
n8n_common_ollama_model: qwen2.5:1.5b
n8n_common_agent_workflow_token: ''
n8n_common_agent_system_prompt: ''
n8n_common_agent_min_memory_chars: 40
n8n_common_agent_allow_general_kb: false
n8n_common_agent_debug: false
n8n_common_agent_memory_schema: agent
n8n_common_agent_memory_table: agent_memory_messages
n8n_common_agent_wiki_schema: public
n8n_common_agent_wiki_table: pages
n8n_common_agent_wiki_title_column: title
n8n_common_agent_wiki_path_column: path
n8n_common_agent_wiki_content_column: render
n8n_common_agent_wiki_limit: 5
n8n_common_agent_wiki_context_chars: 8000
n8n_common_agent_wiki_min_score: 2
n8n_common_agent_wiki_min_term_hits: 1
n8n_common_agent_min_answer_overlap: 0
n8n_common_block_env_access_in_node: false

# n8n web delta
n8n_web_container_name: n8n-web
n8n_web_bind_host: '{{ private_ip }}'
n8n_web_port: 5678
n8n_web_container_port: 5678
n8n_web_command: start
n8n_web_healthcheck_path: /healthz

# n8n worker delta
n8n_worker_container_name: n8n-worker
n8n_worker_command: worker
n8n_worker_concurrency: 5

# n8n public endpoint settings (for editor/webhook URLs)
n8n_public_host: '{{ n8n_web_bind_host }}'
n8n_public_port: '{{ n8n_web_port }}'
n8n_public_port_suffix: "{{ '' if (n8n_public_port | int in [80, 443]) else ':' ~ (n8n_public_port | string) }}"
n8n_public_base_url: 'https://{{ n8n_public_host }}{{ n8n_public_port_suffix }}'

# n8n platform mapping
n8n_common_platform_map:
  x86_64: linux/amd64
  aarch64: linux/arm64/v8
n8n_common_image_platform: "{{ n8n_common_platform_map.get(ansible_architecture, '') }}"

# redis runtime
n8n_redis_image_repository: redis
n8n_redis_image_tag: '8.2.5-bookworm'
n8n_redis_image_digest: 'sha256:9e38e6ea04a97f282e8f063c23f91ebb28e65b30be70d98fbf36e7001ac98824'
n8n_redis_image: '{{ n8n_redis_image_repository }}:{{ n8n_redis_image_tag }}@{{ n8n_redis_image_digest }}'
n8n_redis_container_name: redis
n8n_redis_restart_policy: unless-stopped
n8n_redis_appendonly: 'yes'

n8n_redis_platform_map:
  x86_64: linux/amd64
  aarch64: linux/arm64/v8
n8n_redis_image_platform: "{{ n8n_redis_platform_map.get(ansible_architecture, '') }}"

n8n_redis_healthcheck_interval: 10s
n8n_redis_healthcheck_timeout: 3s
n8n_redis_healthcheck_retries: 20
n8n_redis_healthcheck_start_period: 10s

# redis queue connection for n8n
n8n_redis_host: redis
n8n_redis_port: 6379
n8n_redis_password: ''
n8n_redis_db: 0

# postgres connection for n8n
n8n_postgres_db_type: postgresdb
n8n_postgres_host: ''
n8n_postgres_port: 5432
n8n_postgres_database: n8n
n8n_postgres_user: n8n
n8n_postgres_password: ''

# postgres connection for wikijs credential bootstrap in n8n
n8n_wikijs_postgres_host: "{{ n8n_postgres_host }}"
n8n_wikijs_postgres_port: "{{ n8n_postgres_port }}"
n8n_wikijs_postgres_database: wikijs
n8n_wikijs_postgres_user: wikijs
n8n_wikijs_postgres_password: "{{ wikijs_postgres_password | default('') }}"

# compose deploy behavior
n8n_stack_compose_wait: false
n8n_stack_compose_wait_timeout: 600
n8n_deploy_http_wait_retries: 40
n8n_deploy_http_wait_delay: 3
n8n_deploy_http_wait_timeout: 10

# workflow bootstrap (workflow-as-code)
n8n_workflows_bootstrap_enabled: true
n8n_workflows_force_import: false
n8n_workflows_activate_after_import: true
n8n_workflows_no_log: true
n8n_workflows_postgres_credential_bootstrap_enabled: true
n8n_workflows_postgres_credential_force_reconcile: false
n8n_workflows_postgres_credential_id: "e8fbc146-8e7e-4f81-8d2e-8a322524ec31"
n8n_workflows_postgres_credential_name: "Postgres n8n"
n8n_workflows_postgres_credential_type: postgres
n8n_workflows_postgres_credential_ssl_mode: disable
n8n_workflows_postgres_credential_allow_unauthorized_certs: false
n8n_workflows_postgres_credential_pool_size: 10
n8n_workflows_postgres_credential_source_file: "{{ n8n_workflows_target_dir }}/credential-postgres-n8n.json"
n8n_workflows_postgres_credential_container_file: "{{ n8n_workflows_container_dir }}/credential-postgres-n8n.json"
n8n_workflows_postgres_credential_source_owner: "{{ n8n_stack_data_dir_owner }}"
n8n_workflows_postgres_credential_source_group: "{{ n8n_stack_data_dir_group }}"
n8n_workflows_postgres_credential_source_mode: "0640"

n8n_workflows_wikijs_postgres_credential_bootstrap_enabled: true
n8n_workflows_wikijs_postgres_credential_force_reconcile: false
n8n_workflows_wikijs_postgres_credential_id: "52c9bc40-a4f6-49c9-b831-3c2f09fd24df"
n8n_workflows_wikijs_postgres_credential_name: "Postgres wikijs"
n8n_workflows_wikijs_postgres_credential_type: postgres
n8n_workflows_wikijs_postgres_credential_ssl_mode: disable
n8n_workflows_wikijs_postgres_credential_allow_unauthorized_certs: false
n8n_workflows_wikijs_postgres_credential_pool_size: 10
n8n_workflows_wikijs_postgres_credential_source_file: "{{ n8n_workflows_target_dir }}/credential-postgres-wikijs.json"
n8n_workflows_wikijs_postgres_credential_container_file: "{{ n8n_workflows_container_dir }}/credential-postgres-wikijs.json"
n8n_workflows_wikijs_postgres_credential_source_owner: "{{ n8n_stack_data_dir_owner }}"
n8n_workflows_wikijs_postgres_credential_source_group: "{{ n8n_stack_data_dir_group }}"
n8n_workflows_wikijs_postgres_credential_source_mode: "0640"
n8n_workflows_files:
  - memory_read.json
  - memory_write.json
  - agent_query_main.json
  - agent_chat_ui.json
  - agent_smoke_e2e.json
# n8n stores production webhook paths with workflow-id/node-name prefix.
# Keep these defaults aligned with workflow IDs/names in n8n/workflows/*.json.
n8n_workflow_agent_query_webhook_path: "9c7e0a12-6d2f-4f9c-9ab1-cf2d6c8f5303/webhook_agent_query/agent-query"
n8n_workflow_memory_read_webhook_path: "f5d4d6d6-8c5a-4b35-a1e9-0f8e4a6f2101/webhook_memory_read/agent-memory-read"
n8n_workflow_memory_write_webhook_path: "a1b7c2f4-3f20-4f57-9f4e-7f1b8d2f4c02/webhook_memory_write/agent-memory-write"
n8n_workflows_source_dir: "{{ playbook_dir }}/../../../n8n/workflows"
n8n_workflows_target_dir: "{{ n8n_stack_project_dir }}/workflows"
n8n_workflows_target_dir_owner: root
n8n_workflows_target_dir_group: root
n8n_workflows_target_dir_mode: "0755"
n8n_workflows_container_dir: /opt/ai-agent/workflows
n8n_workflows_state_file: "{{ n8n_stack_project_dir }}/.workflows-imported"

# verify behavior
n8n_verify_enabled: true
n8n_verify_redis_ping_enabled: true
