---
- name: Validate required postgres variables
  ansible.builtin.assert:
    that:
      - postgres_bind_host | trim | length > 0
      - postgres_port | int > 0
      - postgres_port | int < 65536
      - postgres_image_platform | trim | length > 0
      - postgres_superuser | trim | length > 0
      - postgres_superuser is match('^[A-Za-z_][A-Za-z0-9_]{0,62}$')
      - postgres_superuser_password | trim | length > 0
      - postgres_superuser_password != "CHANGE_ME_IN_VAULT"
      - postgres_n8n_user | trim | length > 0
      - postgres_n8n_user is match('^[A-Za-z_][A-Za-z0-9_]{0,62}$')
      - postgres_n8n_db | trim | length > 0
      - postgres_n8n_db is match('^[A-Za-z_][A-Za-z0-9_]{0,62}$')
      - postgres_n8n_password | trim | length > 0
      - postgres_wiki_user | trim | length > 0
      - postgres_wiki_user is match('^[A-Za-z_][A-Za-z0-9_]{0,62}$')
      - postgres_wiki_db | trim | length > 0
      - postgres_wiki_db is match('^[A-Za-z_][A-Za-z0-9_]{0,62}$')
      - postgres_wiki_password | trim | length > 0
      - postgres_agent_memory_schema | trim | length > 0
      - postgres_agent_memory_schema is match('^[A-Za-z_][A-Za-z0-9_]{0,62}$')
      - postgres_agent_memory_table | trim | length > 0
      - postgres_agent_memory_table is match('^[A-Za-z_][A-Za-z0-9_]{0,62}$')
      - postgres_agent_memory_session_created_index | trim | length > 0
      - postgres_agent_memory_session_created_index is match('^[A-Za-z_][A-Za-z0-9_]{0,62}$')
      - postgres_agent_memory_created_at_index | trim | length > 0
      - postgres_agent_memory_created_at_index is match('^[A-Za-z_][A-Za-z0-9_]{0,62}$')
      - postgres_hba_rules is iterable
      - postgres_hba_rules | length > 0
      - postgres_data_dir_owner | string | trim | length > 0
      - postgres_data_dir_group | string | trim | length > 0
      - postgres_data_dir_mode | string | trim | length > 0
      - postgres_compose_wait_timeout | int > 0
      - postgres_deploy_pg_isready_retries | int > 0
      - postgres_deploy_pg_isready_delay | int > 0
    fail_msg: "Postgres role validation failed: check architecture/credentials/network/HBA variables."
  tags: [postgres, postgres_validate]

- name: Validate pg_hba rules are mappings
  ansible.builtin.assert:
    that:
      - item is mapping
    fail_msg: "Each postgres_hba_rules item must be a mapping/dictionary."
  loop: "{{ postgres_hba_rules }}"
  loop_control:
    label: "{{ item | to_json }}"
  tags: [postgres, postgres_validate]

- name: Validate pg_hba rule required fields and values
  ansible.builtin.assert:
    that:
      - "'type' in item"
      - "'database' in item"
      - "'user' in item"
      - "'address' in item"
      - "'method' in item"
      - item.type is string
      - item.database is string
      - item.user is string
      - item.address is string
      - item.method is string
      - item.type | trim | length > 0
      - item.database | trim | length > 0
      - item.user | trim | length > 0
      - item.address | trim | length > 0
      - item.method | trim | length > 0
      - item.type in postgres_hba_allowed_types
    fail_msg: >-
      Invalid pg_hba rule. Required keys: type, database, user, address, method.
      Allowed types: {{ postgres_hba_allowed_types | join(', ') }}.
  loop: "{{ postgres_hba_rules }}"
  loop_control:
    label: "{{ item | to_json }}"
  when: item is mapping
  tags: [postgres, postgres_validate]

- name: Validate pg_hba rule addresses are valid IPv4/IPv6 CIDR
  ansible.builtin.command:
    argv:
      - "{{ ansible_python_interpreter | default('python3') }}"
      - -c
      - |
        import ipaddress
        import sys

        address = sys.argv[1].strip()
        if "/" not in address:
            raise ValueError("CIDR suffix is required")
        ipaddress.ip_network(address, strict=False)
      - "{{ item.address }}"
  register: postgres_hba_address_validation
  changed_when: false
  failed_when: false
  loop: "{{ postgres_hba_rules }}"
  loop_control:
    label: "{{ item | to_json }}"
  when:
    - item is mapping
    - item.type in postgres_hba_allowed_types
  tags: [postgres, postgres_validate]

- name: Assert pg_hba addresses validation passed
  ansible.builtin.assert:
    that:
      - (postgres_hba_address_validation.results | rejectattr('rc', 'equalto', 0) | list | length) == 0
    fail_msg: >-
      Invalid pg_hba rule address value(s): {{
        postgres_hba_address_validation.results
        | rejectattr('rc', 'equalto', 0)
        | map(attribute='item.address')
        | list
        | join(', ')
      }}.
      Each postgres_hba_rules[].address must be a valid IPv4/IPv6 CIDR
      (for example: 10.10.0.12/32 or 2001:db8::1/128).
  tags: [postgres, postgres_validate]
