---
- name: Ensure postgres directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop: >-
    {{
      [postgres_project_dir, postgres_init_dir, postgres_config_dir]
    }}
  tags: [postgres, postgres_install]

- name: Ensure postgres data directory exists with postgres ownership
  ansible.builtin.file:
    path: "{{ postgres_data_dir }}"
    state: directory
    owner: "{{ postgres_data_dir_owner }}"
    group: "{{ postgres_data_dir_group }}"
    mode: "{{ postgres_data_dir_mode }}"
  tags: [postgres, postgres_install]

- name: Render postgres docker-compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ postgres_compose_file_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Apply postgres stack changes
  tags: [postgres, postgres_install]

- name: Render postgres env file
  ansible.builtin.template:
    src: postgres.env.j2
    dest: "{{ postgres_env_file_path }}"
    owner: root
    group: root
    mode: "0600"
  notify: Apply postgres stack changes
  tags: [postgres, postgres_install]

- name: Render postgres pg_hba config
  ansible.builtin.template:
    src: pg_hba.conf.j2
    dest: "{{ postgres_hba_config_path }}"
    owner: root
    group: root
    mode: "0644"
    # pg_hba.conf is bind-mounted into container as a single file.
    # Keep inode stable to make in-container reloads reliable.
    unsafe_writes: true
    newline_sequence: "\n"
  notify:
    - Apply postgres stack changes
    - Reload postgres pg_hba config
  tags: [postgres, postgres_install]

- name: Render postgres init SQL
  ansible.builtin.template:
    src: init.sql.j2
    dest: "{{ postgres_init_sql_host_path }}"
    owner: root
    group: root
    mode: "0644"
  tags: [postgres, postgres_install]
