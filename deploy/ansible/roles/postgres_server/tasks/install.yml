---
- name: Ensure postgres directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop: >-
    {{
      [postgres_project_dir, postgres_data_dir, postgres_init_dir, postgres_config_dir]
      + ([postgres_tls_dir] if (postgres_tls_enabled | bool) else [])
    }}
  tags: [postgres, postgres_install]

- name: Render postgres docker-compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ postgres_compose_file_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Apply postgres stack changes
  tags: [postgres, postgres_install]

- name: Render postgres env file
  ansible.builtin.template:
    src: postgres.env.j2
    dest: "{{ postgres_env_file_path }}"
    owner: root
    group: root
    mode: "0600"
  notify: Apply postgres stack changes
  tags: [postgres, postgres_install]

- name: Render postgres pg_hba config
  ansible.builtin.template:
    src: pg_hba.conf.j2
    dest: "{{ postgres_hba_config_path }}"
    owner: root
    group: root
    mode: "0640"
  notify: Apply postgres stack changes
  tags: [postgres, postgres_install]

- name: Render postgres init SQL
  ansible.builtin.template:
    src: init.sql.j2
    dest: "{{ postgres_init_sql_host_path }}"
    owner: root
    group: root
    mode: "0640"
  tags: [postgres, postgres_install]

- name: Enforce TLS certificate file owner/mode
  ansible.builtin.file:
    path: "{{ postgres_tls_cert_path }}"
    owner: "{{ postgres_tls_cert_file_owner }}"
    group: "{{ postgres_tls_cert_file_group }}"
    mode: "{{ postgres_tls_cert_file_mode }}"
    state: file
  when:
    - postgres_tls_enabled | bool
    - postgres_tls_manage_file_permissions | bool
  notify: Apply postgres stack changes
  tags: [postgres, postgres_install]

- name: Enforce TLS key file owner/mode
  ansible.builtin.file:
    path: "{{ postgres_tls_key_path }}"
    owner: "{{ postgres_tls_key_file_owner }}"
    group: "{{ postgres_tls_key_file_group }}"
    mode: "{{ postgres_tls_key_file_mode }}"
    state: file
  when:
    - postgres_tls_enabled | bool
    - postgres_tls_manage_file_permissions | bool
  notify: Apply postgres stack changes
  tags: [postgres, postgres_install]

- name: Enforce TLS CA file owner/mode when CA enabled
  ansible.builtin.file:
    path: "{{ postgres_tls_ca_path }}"
    owner: "{{ postgres_tls_ca_file_owner }}"
    group: "{{ postgres_tls_ca_file_group }}"
    mode: "{{ postgres_tls_ca_file_mode }}"
    state: file
  when:
    - postgres_tls_enabled | bool
    - postgres_tls_ca_enabled | bool
    - postgres_tls_manage_file_permissions | bool
  notify: Apply postgres stack changes
  tags: [postgres, postgres_install]
