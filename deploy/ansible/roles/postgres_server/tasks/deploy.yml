---
- name: Deploy postgres stack with docker compose
  community.docker.docker_compose_v2:
    project_src: "{{ postgres_project_dir }}"
    state: present
    wait: "{{ postgres_compose_wait }}"
    wait_timeout: "{{ postgres_compose_wait_timeout }}"
  register: postgres_compose_deploy_result
  tags: [postgres, postgres_deploy]

- name: Wait for postgres readiness with pg_isready after deploy
  community.docker.docker_container_exec:
    container: "{{ postgres_container_name }}"
    argv:
      - pg_isready
      - -U
      - "{{ postgres_superuser }}"
      - -d
      - "{{ postgres_default_db }}"
  register: postgres_pg_isready_after_deploy
  changed_when: false
  retries: "{{ postgres_deploy_pg_isready_retries | int }}"
  delay: "{{ postgres_deploy_pg_isready_delay | int }}"
  until:
    - postgres_pg_isready_after_deploy.rc == 0
    - "'accepting connections' in (postgres_pg_isready_after_deploy.stdout | default(''))"
  when: not ansible_check_mode
  tags: [postgres, postgres_deploy]

- name: Mark postgres deploy executed in current run
  ansible.builtin.set_fact:
    postgres_deploy_executed: true
  changed_when: false
  when: postgres_compose_deploy_result is not skipped
  tags: [postgres, postgres_deploy]
