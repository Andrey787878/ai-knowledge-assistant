---
helmDefaults:
  skipDeps: true

releases:
  - name: n8n-workflows
    namespace: {{ .Values.namespace | quote }}
    createNamespace: false
    chart: ../../../vendor_charts/raw
    wait: true
    installed: {{ .Values.workflows_release_enabled }}
    hooks:
      - events: ["postsync"]
        showlogs: true
        command: sh
        args:
          - -ec
          - |
            ns={{ .Values.namespace | quote }}
            deploy="n8n-web"
            cm={{ .Values.workflows_configmap_name | quote }}
            ann='ai-knowledge-assistant-workflows-hash'

            desired="$(
              kubectl -n "$ns" get configmap "$cm" \
                -o jsonpath='{.data.agent_query_main\.json}{.data.agent_chat_ui\.json}{.data.memory_read\.json}{.data.memory_write\.json}{.data.agent_smoke_e2e\.json}' \
              | sha256sum \
              | awk '{print $1}'
            )"

            if [ -z "$desired" ]; then
              echo "Failed to calculate workflows hash from ConfigMap ${cm}"
              exit 1
            fi

            current="$(
              kubectl -n "$ns" get deployment "$deploy" \
                -o jsonpath="{.spec.template.metadata.annotations['$ann']}" 2>/dev/null || true
            )"

            if [ -n "$current" ] && [ "$current" = "$desired" ]; then
              echo "Workflows hash unchanged ($desired), skip n8n-web rollout"
              exit 0
            fi

            kubectl -n "$ns" patch deployment "$deploy" --type merge -p \
              "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"$ann\":\"$desired\"}}}}}"

            kubectl -n "$ns" rollout status "deployment/$deploy" --timeout=300s
    values:
      - resources:
          - apiVersion: v1
            kind: ConfigMap
            metadata:
              name: {{ .Values.workflows_configmap_name | quote }}
              labels:
                app.kubernetes.io/part-of: {{ .Values.app_part_of | quote }}
                app.kubernetes.io/managed-by: {{ .Values.app_managed_by | quote }}
            data:
              agent_query_main.json: |
                {{- readFile "../../../../../n8n/workflows/agent_query_main.json" | nindent 16 }}
              agent_chat_ui.json: |
                {{- readFile "../../../../../n8n/workflows/agent_chat_ui.json" | nindent 16 }}
              memory_read.json: |
                {{- readFile "../../../../../n8n/workflows/memory_read.json" | nindent 16 }}
              memory_write.json: |
                {{- readFile "../../../../../n8n/workflows/memory_write.json" | nindent 16 }}
              agent_smoke_e2e.json: |
                {{- readFile "../../../../../n8n/workflows/agent_smoke_e2e.json" | nindent 16 }}
      - templates:
          - |
            apiVersion: batch/v1
            kind: Job
            metadata:
              name: {{ .Values.workflows_import_job_name | quote }}
              labels:
                app.kubernetes.io/part-of: {{ .Values.app_part_of | quote }}
                app.kubernetes.io/managed-by: {{ .Values.app_managed_by | quote }}
                app.kubernetes.io/name: n8n
                app.kubernetes.io/instance: n8n
                app.kubernetes.io/component: workflows-import
              annotations:
                helm.sh/hook: post-install,post-upgrade
                helm.sh/hook-delete-policy: before-hook-creation
            spec:
              backoffLimit: {{ .Values.workflows_import_backoff_limit }}
              ttlSecondsAfterFinished: {{ .Values.workflows_import_ttl_seconds_after_finished }}
              template:
                metadata:
                  labels:
                    app.kubernetes.io/part-of: {{ .Values.app_part_of | quote }}
                    app.kubernetes.io/name: n8n
                    app.kubernetes.io/instance: n8n
                    app.kubernetes.io/component: workflows-import
                spec:
                  restartPolicy: Never
                  securityContext:
                    runAsNonRoot: true
                    runAsUser: 1000
                    runAsGroup: 1000
                    fsGroup: 1000
                    seccompProfile:
                      type: RuntimeDefault
                  containers:
                    - name: n8n-import
                      image: {{ .Values.workflows_job_image | quote }}
                      imagePullPolicy: IfNotPresent
                      securityContext:
                        allowPrivilegeEscalation: false
                        capabilities:
                          drop:
                            - ALL
                      command:
                        - /bin/sh
                        - -ec
                      args:
                        - |
                          test -n "$(find /workflows -maxdepth 1 -name '*.json' -print -quit)"
                          tmp_dir="$(mktemp -d)"
                          trap 'rm -rf "$tmp_dir"' EXIT
                          failed=0

                          # Bootstrap Postgres credentials required by workflows.
                          cred_file="$tmp_dir/credentials-postgres.json"
                          node -e 'const fs=require("fs"); const out=process.argv[1]; const payload=[{id:"e8fbc146-8e7e-4f81-8d2e-8a322524ec31",name:"Postgres n8n",type:"postgres",data:{host:String(process.env.DB_POSTGRESDB_HOST||""),port:Number(process.env.DB_POSTGRESDB_PORT||5432),database:String(process.env.DB_POSTGRESDB_DATABASE||"n8n"),user:String(process.env.DB_POSTGRESDB_USER||"n8n"),password:String(process.env.DB_POSTGRESDB_PASSWORD||""),ssl:"disable",allowUnauthorizedCerts:false,poolSize:10}},{id:"52c9bc40-a4f6-49c9-b831-3c2f09fd24df",name:"Postgres wikijs",type:"postgres",data:{host:String(process.env.WIKI_POSTGRESDB_HOST||""),port:Number(process.env.WIKI_POSTGRESDB_PORT||5432),database:String(process.env.WIKI_POSTGRESDB_DATABASE||"wikijs"),user:String(process.env.WIKI_POSTGRESDB_USER||"wikijs"),password:String(process.env.WIKI_POSTGRESDB_PASSWORD||""),ssl:"disable",allowUnauthorizedCerts:false,poolSize:10}}]; fs.writeFileSync(out, JSON.stringify(payload));' "$cred_file"
                          cred_log="$tmp_dir/import-credentials.log"
                          if ! n8n import:credentials --decrypted --input="$cred_file" >"$cred_log" 2>&1; then
                            cat "$cred_log"
                            if grep -qiE 'already exists|duplicate key value' "$cred_log"; then
                              echo "One or more credentials already exist, skipping duplicates."
                            else
                              failed=1
                            fi
                          else
                            cat "$cred_log"
                          fi

                          # n8n import may fail on duplicate tag constraints across workflows.
                          # Remove tags on import payload and import one-by-one.
                          for src in /workflows/*.json; do
                            dst="$tmp_dir/wf-$(basename "$src")"
                            node -e 'const fs=require("fs"); const input=process.argv[1]; const output=process.argv[2]; const data=JSON.parse(fs.readFileSync(input,"utf8")); delete data.tags; fs.writeFileSync(output, JSON.stringify(data));' "$src" "$dst"
                          done

                          delete_cmd_supported=false
                          if n8n delete:workflow --help >/dev/null 2>&1; then
                            delete_cmd_supported=true
                          else
                            echo "n8n delete:workflow is not available in this n8n version, importing without pre-delete."
                          fi

                          import_replace_flag=""
                          import_help="$(n8n import:workflow --help 2>&1 || true)"
                          for flag in --replace --overwrite --force; do
                            if printf '%s\n' "$import_help" | grep -q -- "$flag"; then
                              import_replace_flag="$flag"
                              break
                            fi
                          done
                          if [ -n "$import_replace_flag" ]; then
                            echo "n8n import supports replacement flag: $import_replace_flag"
                          fi

                          for wf in "$tmp_dir"/wf-*.json; do
                            wf_base="$(basename "$wf")"
                            workflow_id="$(node -e 'const fs=require("fs"); const data=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); if (data && data.id) process.stdout.write(String(data.id));' "$wf")"
                            echo "Importing ${wf_base} (id=${workflow_id:-unknown}) ..."
                            if [ -n "$workflow_id" ] && [ "$delete_cmd_supported" = "true" ]; then
                              # Force exact repo version in DB: delete existing workflow with the same id first.
                              delete_log="$tmp_dir/delete-${workflow_id}.log"
                              if n8n delete:workflow --id="$workflow_id" >"$delete_log" 2>&1; then
                                cat "$delete_log"
                              else
                                cat "$delete_log"
                                if grep -qiE 'not found|No workflow found' "$delete_log"; then
                                  echo "Workflow id=${workflow_id} does not exist yet, continuing with import."
                                else
                                  failed=1
                                  continue
                                fi
                              fi
                            fi
                            log_file="$tmp_dir/import-${wf_base}.log"
                            if ! n8n import:workflow --input="$wf" >"$log_file" 2>&1; then
                              cat "$log_file"
                              if [ "$delete_cmd_supported" != "true" ] && grep -qiE 'already exists|duplicate key value|violates unique constraint|workflow with this id|conflict' "$log_file"; then
                                if [ -n "$import_replace_flag" ]; then
                                  replace_log="$tmp_dir/import-replace-${wf_base}.log"
                                  if n8n import:workflow "$import_replace_flag" --input="$wf" >"$replace_log" 2>&1; then
                                    cat "$replace_log"
                                    continue
                                  fi
                                  cat "$replace_log"
                                fi
                                echo "Workflow ${wf_base} already exists and cannot be replaced with this n8n CLI version. Keeping existing DB version."
                                continue
                              fi
                              failed=1
                            else
                              cat "$log_file"
                            fi
                          done

                          # n8n import deactivates workflows by default.
                          # Re-activate only workflows explicitly marked active=true in source JSON.
                          for wf in /workflows/*.json; do
                            workflow_id="$(node -e 'const fs=require("fs"); const data=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); if(data && data.active === true && data.id){ process.stdout.write(String(data.id)); }' "$wf")"
                            if [ -n "$workflow_id" ]; then
                              echo "Publishing and activating workflow id=$workflow_id ..."
                              if ! n8n publish:workflow --id="$workflow_id"; then
                                failed=1
                              fi
                              if ! n8n update:workflow --id="$workflow_id" --active=true; then
                                failed=1
                              fi
                            fi
                          done

                          exit "$failed"
                      env:
                        - name: NODE_ENV
                          value: production
                      envFrom:
                        - configMapRef:
                            name: n8n-cm
                        - secretRef:
                            name: n8n-secret
                      volumeMounts:
                        - name: workflows
                          mountPath: /workflows
                          readOnly: true
                      resources:
                        {{- toYaml .Values.workflows_import_resources | nindent 24 }}
                  volumes:
                    - name: workflows
                      configMap:
                        name: {{ .Values.workflows_configmap_name | quote }}
