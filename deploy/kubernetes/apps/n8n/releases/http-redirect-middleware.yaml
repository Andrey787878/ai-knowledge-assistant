---
helmDefaults:
  skipDeps: true

releases:
  - name: n8n-http-redirect
    namespace: {{ .Values.namespace | quote }}
    createNamespace: false
    chart: ../../../vendor_charts/raw
    wait: true
    values:
      - resources:
          - apiVersion: traefik.io/v1alpha1
            kind: Middleware
            metadata:
              name: https-redirect
            spec:
              redirectScheme:
                scheme: https
                permanent: true
