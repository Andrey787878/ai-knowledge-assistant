---
helmDefaults:
  skipDeps: true

releases:
  - name: postgres-initdb-secret
    namespace: {{ .Values.namespace | quote }}
    createNamespace: false
    chart: ../../../vendor_charts/raw
    wait: true
    secrets:
      - ../environments/prod/secrets.values.enc.yaml
    values:
      - ../environments/prod/app.values.yaml
      - templates:
          - |
            apiVersion: v1
            kind: Secret
            metadata:
              name: {{ .Values.primary.initdb.scriptsSecret | quote }}
            type: Opaque
            stringData:
              01-apps.sql: |
                \set ON_ERROR_STOP on

                -- This script runs only on first init of empty PostgreSQL data dir.
                -- It creates app roles/databases and bootstraps agent memory schema.

                DO $$
                BEGIN
                  IF NOT EXISTS (SELECT 1 FROM pg_catalog.pg_roles WHERE rolname = 'wikijs') THEN
                    EXECUTE format(
                      'CREATE ROLE %I WITH LOGIN PASSWORD %L NOSUPERUSER NOCREATEDB NOCREATEROLE NOINHERIT',
                      'wikijs',
                      {{ "{{ .Values.db_users.wikijs_password }}" | squote }}
                    );
                  ELSE
                    EXECUTE format(
                      'ALTER ROLE %I WITH LOGIN PASSWORD %L NOSUPERUSER NOCREATEDB NOCREATEROLE NOINHERIT',
                      'wikijs',
                      {{ "{{ .Values.db_users.wikijs_password }}" | squote }}
                    );
                  END IF;
                END
                $$;

                DO $$
                BEGIN
                  IF NOT EXISTS (SELECT 1 FROM pg_catalog.pg_roles WHERE rolname = 'n8n') THEN
                    EXECUTE format(
                      'CREATE ROLE %I WITH LOGIN PASSWORD %L NOSUPERUSER NOCREATEDB NOCREATEROLE NOINHERIT',
                      'n8n',
                      {{ "{{ .Values.db_users.n8n_password }}" | squote }}
                    );
                  ELSE
                    EXECUTE format(
                      'ALTER ROLE %I WITH LOGIN PASSWORD %L NOSUPERUSER NOCREATEDB NOCREATEROLE NOINHERIT',
                      'n8n',
                      {{ "{{ .Values.db_users.n8n_password }}" | squote }}
                    );
                  END IF;
                END
                $$;

                SELECT format(
                  'CREATE DATABASE %I OWNER %I',
                  'n8n',
                  'n8n'
                )
                WHERE NOT EXISTS (
                  SELECT 1
                  FROM pg_catalog.pg_database
                  WHERE datname = 'n8n'
                )\gexec

                SELECT format(
                  'ALTER DATABASE %I OWNER TO %I',
                  'n8n',
                  'n8n'
                )\gexec

                SELECT format(
                  'CREATE DATABASE %I OWNER %I',
                  'wikijs',
                  'wikijs'
                )
                WHERE NOT EXISTS (
                  SELECT 1
                  FROM pg_catalog.pg_database
                  WHERE datname = 'wikijs'
                )\gexec

                SELECT format(
                  'ALTER DATABASE %I OWNER TO %I',
                  'wikijs',
                  'wikijs'
                )\gexec

                SELECT format('REVOKE ALL ON DATABASE %I FROM PUBLIC', 'n8n')\gexec
                SELECT format('GRANT CONNECT, TEMP ON DATABASE %I TO %I', 'n8n', 'n8n')\gexec

                SELECT format('REVOKE ALL ON DATABASE %I FROM PUBLIC', 'wikijs')\gexec
                SELECT format('GRANT CONNECT, TEMP ON DATABASE %I TO %I', 'wikijs', 'wikijs')\gexec

                -- Agent memory schema/table/indexes live in n8n DB (same pattern as Stage A).
                \connect n8n

                SELECT format(
                  'CREATE SCHEMA IF NOT EXISTS %I AUTHORIZATION %I',
                  'agent',
                  'n8n'
                )\gexec

                SELECT format($sql$
                CREATE TABLE IF NOT EXISTS %I.%I (
                  id BIGINT GENERATED ALWAYS AS IDENTITY PRIMARY KEY,
                  session_id TEXT NOT NULL,
                  role TEXT NOT NULL CHECK (role IN ('user','assistant','system','tool')),
                  message TEXT NOT NULL,
                  metadata JSONB NOT NULL DEFAULT '{}'::jsonb,
                  created_at TIMESTAMPTZ NOT NULL DEFAULT now()
                )
                $sql$,
                  'agent',
                  'agent_memory_messages'
                )\gexec

                SELECT format(
                  'ALTER TABLE %I.%I OWNER TO %I',
                  'agent',
                  'agent_memory_messages',
                  'n8n'
                )\gexec

                SELECT format(
                  'CREATE INDEX IF NOT EXISTS %I ON %I.%I (session_id, created_at DESC)',
                  'agent_memory_messages_session_created_idx',
                  'agent',
                  'agent_memory_messages'
                )\gexec

                SELECT format(
                  'CREATE INDEX IF NOT EXISTS %I ON %I.%I (created_at)',
                  'agent_memory_messages_created_at_idx',
                  'agent',
                  'agent_memory_messages'
                )\gexec

                SELECT format(
                  'GRANT USAGE ON SCHEMA %I TO %I',
                  'agent',
                  'n8n'
                )\gexec

                SELECT format(
                  'ALTER ROLE %I IN DATABASE %I SET search_path TO %I,public',
                  'n8n',
                  'n8n',
                  'agent'
                )\gexec

                \connect postgres
