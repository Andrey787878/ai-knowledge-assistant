---
helmDefaults:
  skipDeps: true

releases:
  - name: postgres-networkpolicy
    namespace: {{ .Values.namespace | quote }}
    createNamespace: false
    chart: ../../../vendor_charts/raw
    wait: true
    values:
      - resources:
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: db-default-deny
              labels:
                app.kubernetes.io/part-of: {{ .Values.app_part_of | quote }}
                app.kubernetes.io/managed-by: {{ .Values.app_managed_by | quote }}
            spec:
              podSelector: {}
              policyTypes:
                - Ingress
                - Egress

          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: postgres-allow-ingress-from-apps-and-ops
              labels:
                app.kubernetes.io/part-of: {{ .Values.app_part_of | quote }}
                app.kubernetes.io/managed-by: {{ .Values.app_managed_by | quote }}
            spec:
              podSelector:
                matchLabels:
                  app.kubernetes.io/instance: postgres
                  app.kubernetes.io/name: postgresql
              policyTypes:
                - Ingress
              ingress:
                - from:
                    - namespaceSelector:
                        matchLabels:
                          kubernetes.io/metadata.name: db
                      podSelector:
                        matchLabels:
                          app.kubernetes.io/component: postgres-ops
                    - namespaceSelector:
                        matchLabels:
                          kubernetes.io/metadata.name: wiki
                      podSelector:
                        matchLabels:
                          app.kubernetes.io/instance: wikijs
                    - namespaceSelector:
                        matchLabels:
                          kubernetes.io/metadata.name: n8n
                      podSelector:
                        matchLabels:
                          app.kubernetes.io/name: n8n
                  ports:
                    - protocol: TCP
                      port: 5432

          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: postgres-ops-allow-egress-postgres
              labels:
                app.kubernetes.io/part-of: {{ .Values.app_part_of | quote }}
                app.kubernetes.io/managed-by: {{ .Values.app_managed_by | quote }}
            spec:
              podSelector:
                matchLabels:
                  app.kubernetes.io/component: postgres-ops
              policyTypes:
                - Egress
              egress:
                - to:
                    - namespaceSelector:
                        matchLabels:
                          kubernetes.io/metadata.name: {{ .Values.namespace | quote }}
                      podSelector:
                        matchLabels:
                          app.kubernetes.io/instance: postgres
                          app.kubernetes.io/name: postgresql
                  ports:
                    - protocol: TCP
                      port: 5432

          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: db-allow-egress-dns
              labels:
                app.kubernetes.io/part-of: {{ .Values.app_part_of | quote }}
                app.kubernetes.io/managed-by: {{ .Values.app_managed_by | quote }}
            spec:
              podSelector: {}
              policyTypes:
                - Egress
              egress:
                - to:
                    - namespaceSelector:
                        matchLabels:
                          kubernetes.io/metadata.name: kube-system
                      podSelector:
                        matchLabels:
                          k8s-app: kube-dns
                    - namespaceSelector:
                        matchLabels:
                          kubernetes.io/metadata.name: kube-system
                      podSelector:
                        matchLabels:
                          app.kubernetes.io/name: coredns
                  ports:
                    - protocol: UDP
                      port: 53
                    - protocol: TCP
                      port: 53
