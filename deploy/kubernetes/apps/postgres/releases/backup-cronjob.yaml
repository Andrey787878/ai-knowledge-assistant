---
helmDefaults:
  skipDeps: true

releases:
  - name: postgres-backup
    namespace: {{ .Values.namespace | quote }}
    createNamespace: false
    chart: ../../../vendor_charts/raw
    # CronJob/PVC operational release should not block full stage on Helm --wait.
    wait: false
    installed: {{ .Values.postgres_backup_enabled }}
    values:
      - templates:
          - |
            {{- if .Values.postgres_backup_pvc_create }}
            apiVersion: v1
            kind: PersistentVolumeClaim
            metadata:
              name: {{ .Values.postgres_backup_pvc_name | quote }}
              labels:
                app.kubernetes.io/part-of: {{ .Values.app_part_of | quote }}
                app.kubernetes.io/managed-by: {{ .Values.app_managed_by | quote }}
                app.kubernetes.io/component: postgres-ops
            spec:
              accessModes:
                - ReadWriteOnce
              {{- if .Values.postgres_backup_pvc_storage_class }}
              storageClassName: {{ .Values.postgres_backup_pvc_storage_class | quote }}
              {{- end }}
              resources:
                requests:
                  storage: {{ .Values.postgres_backup_pvc_size | quote }}
            {{- end }}
          - |
            apiVersion: v1
            kind: ConfigMap
            metadata:
              name: postgres-backup-scripts
              labels:
                app.kubernetes.io/part-of: {{ .Values.app_part_of | quote }}
                app.kubernetes.io/managed-by: {{ .Values.app_managed_by | quote }}
                app.kubernetes.io/component: postgres-ops
            data:
              backup-postgres.sh: |
                #!/usr/bin/env bash
                set -Eeuo pipefail

                ROOT_DIR="${BACKUP_ROOT_DIR:-/backups}"
                CURRENT_DIR="${BACKUP_CURRENT_DIR:-${ROOT_DIR}/current}"
                LOCK_FILE="${BACKUP_LOCK_FILE:-${ROOT_DIR}/.backup.lock}"
                INCLUDE_GLOBALS="${BACKUP_INCLUDE_GLOBALS:-true}"
                PRUNE_ENABLED="${BACKUP_PRUNE_ENABLED:-false}"
                RETENTION_DAYS="${BACKUP_RETENTION_DAYS:-7}"
                PGUSER="${POSTGRES_USER:-postgres}"
                PGHOST="${POSTGRES_HOST:-postgres-postgresql}"
                PGPORT="${POSTGRES_PORT:-5432}"
                DB_LIST="${POSTGRES_BACKUP_DATABASES:-n8n wikijs}"
                BACKUP_TS="$(date +'%Y%m%d-%H%M%S')"
                TARGET_DIR="${ROOT_DIR}/${BACKUP_TS}"
                LOCK_ACQUIRED="false"

                read -r -a BACKUP_DATABASES <<< "${DB_LIST}"

                cleanup() {
                  local rc=$?
                  if [[ "${LOCK_ACQUIRED}" == "true" ]]; then
                    rm -f "${LOCK_FILE}" >/dev/null 2>&1 || true
                  fi
                  exit "${rc}"
                }

                trap cleanup EXIT INT TERM

                if [[ "${#BACKUP_DATABASES[@]}" -eq 0 ]]; then
                  echo "POSTGRES_BACKUP_DATABASES must contain at least one database name." >&2
                  exit 1
                fi

                if [[ -z "${PGPASSWORD:-}" ]]; then
                  echo "PGPASSWORD is required." >&2
                  exit 1
                fi

                mkdir -p "${ROOT_DIR}" "${TARGET_DIR}"

                if [[ -f "${LOCK_FILE}" ]]; then
                  LOCK_PID="$(cat "${LOCK_FILE}" 2>/dev/null || true)"
                  if [[ -n "${LOCK_PID}" && "${LOCK_PID}" =~ ^[0-9]+$ ]] && kill -0 "${LOCK_PID}" 2>/dev/null; then
                    echo "another postgres backup process is running (pid: ${LOCK_PID})" >&2
                    exit 1
                  fi
                  rm -f "${LOCK_FILE}" >/dev/null 2>&1 || true
                fi

                if ! (set -o noclobber; echo "$$" > "${LOCK_FILE}") 2>/dev/null; then
                  echo "backup lock file exists: ${LOCK_FILE}" >&2
                  exit 1
                fi

                LOCK_ACQUIRED="true"

                export PGHOST PGPORT PGUSER PGPASSWORD

                if [[ "${INCLUDE_GLOBALS}" == "true" ]]; then
                  pg_dumpall --globals-only -U "${PGUSER}" > "${TARGET_DIR}/globals.sql"
                fi

                for db_name in "${BACKUP_DATABASES[@]}"; do
                  pg_dump -Fc -U "${PGUSER}" -d "${db_name}" -f "${TARGET_DIR}/${db_name}.dump"
                done

                (
                  cd "${TARGET_DIR}"
                  sha256sum ./* > SHA256SUMS
                )

                ln -sfn "${TARGET_DIR}" "${CURRENT_DIR}"

                if [[ "${PRUNE_ENABLED}" == "true" ]]; then
                  find "${ROOT_DIR}" -mindepth 1 -maxdepth 1 -type d -name '20*' -mtime +"${RETENTION_DAYS}" -exec rm -rf {} +
                fi

                echo "postgres backup completed: ${TARGET_DIR}"
          - |
            apiVersion: batch/v1
            kind: CronJob
            metadata:
              name: postgres-backup
              labels:
                app.kubernetes.io/part-of: {{ .Values.app_part_of | quote }}
                app.kubernetes.io/managed-by: {{ .Values.app_managed_by | quote }}
                app.kubernetes.io/component: postgres-ops
            spec:
              schedule: {{ .Values.postgres_backup_schedule | quote }}
              timeZone: {{ .Values.postgres_backup_time_zone | quote }}
              concurrencyPolicy: Forbid
              startingDeadlineSeconds: {{ .Values.postgres_backup_starting_deadline_seconds }}
              successfulJobsHistoryLimit: {{ .Values.postgres_backup_successful_history }}
              failedJobsHistoryLimit: {{ .Values.postgres_backup_failed_history }}
              jobTemplate:
                spec:
                  template:
                    metadata:
                      labels:
                        app.kubernetes.io/part-of: {{ .Values.app_part_of | quote }}
                        app.kubernetes.io/managed-by: {{ .Values.app_managed_by | quote }}
                        app.kubernetes.io/component: postgres-ops
                    spec:
                      restartPolicy: OnFailure
                      securityContext:
                        runAsNonRoot: true
                        runAsUser: 999
                        runAsGroup: 999
                        fsGroup: 999
                        seccompProfile:
                          type: RuntimeDefault
                      containers:
                        - name: postgres-backup
                          image: {{ .Values.postgres_backup_image | quote }}
                          imagePullPolicy: {{ .Values.postgres_backup_image_pull_policy | quote }}
                          command:
                            - /bin/bash
                            - /scripts/backup-postgres.sh
                          securityContext:
                            allowPrivilegeEscalation: false
                            capabilities:
                              drop:
                                - ALL
                          env:
                            - name: POSTGRES_HOST
                              value: {{ .Values.postgres_backup_service_host | quote }}
                            - name: POSTGRES_PORT
                              value: {{ .Values.postgres_backup_service_port | quote }}
                            - name: POSTGRES_USER
                              value: {{ .Values.postgres_backup_pg_user | quote }}
                            - name: POSTGRES_BACKUP_DATABASES
                              value: {{ .Values.postgres_backup_databases | join " " | quote }}
                            - name: PGPASSWORD
                              valueFrom:
                                secretKeyRef:
                                  name: {{ .Values.postgres_backup_secret_name | quote }}
                                  key: {{ .Values.postgres_backup_secret_key | quote }}
                            - name: BACKUP_ROOT_DIR
                              value: {{ .Values.postgres_backup_root_dir | quote }}
                            - name: BACKUP_INCLUDE_GLOBALS
                              value: {{ ternary "true" "false" .Values.postgres_backup_include_globals | quote }}
                            - name: BACKUP_PRUNE_ENABLED
                              value: {{ ternary "true" "false" .Values.postgres_backup_prune_enabled | quote }}
                            - name: BACKUP_RETENTION_DAYS
                              value: {{ .Values.postgres_backup_retention_days | quote }}
                          resources:
                            {{- toYaml .Values.postgres_backup_resources | nindent 28 }}
                          volumeMounts:
                            - name: scripts
                              mountPath: /scripts
                              readOnly: true
                            - name: backups
                              mountPath: /backups
                      volumes:
                        - name: scripts
                          configMap:
                            name: postgres-backup-scripts
                            defaultMode: 0555
                        - name: backups
                          persistentVolumeClaim:
                            claimName: {{ .Values.postgres_backup_pvc_name | quote }}
