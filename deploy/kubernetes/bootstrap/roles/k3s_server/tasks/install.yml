---
- name: Resolve k3s architecture for release artifacts
  ansible.builtin.set_fact:
    k3s_arch: "{{ k3s_arch_map[ansible_architecture] }}"
    k3s_binary_asset: "{{ k3s_binary_asset_map[k3s_arch_map[ansible_architecture]] }}"
  changed_when: false
  tags: [k3s_server, install]

- name: Build k3s release artifact URLs
  ansible.builtin.set_fact:
    k3s_release_base_url: "{{ k3s_release_download_base_url }}/{{ k3s_version }}"
    k3s_binary_url: "{{ k3s_release_download_base_url }}/{{ k3s_version }}/{{ k3s_binary_asset }}"
    k3s_checksum_url: "{{ k3s_release_download_base_url }}/{{ k3s_version }}/sha256sum-{{ k3s_arch }}.txt"
    k3s_binary_download_path: "{{ k3s_download_dir }}/{{ k3s_binary_asset }}"
    k3s_checksum_download_path: "{{ k3s_download_dir }}/sha256sum-{{ k3s_arch }}.txt"
    k3s_binary_install_path: "{{ k3s_binary_install_dir }}/k3s"
  changed_when: false
  tags: [k3s_server, install]

- name: Ensure k3s download directory exists
  ansible.builtin.file:
    path: "{{ k3s_download_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [k3s_server, install]

- name: Ensure k3s config directory exists
  ansible.builtin.file:
    path: "{{ k3s_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [k3s_server, install]

- name: Render k3s server config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ k3s_config_path }}"
    owner: root
    group: root
    mode: "0644"
  tags: [k3s_server, install]

- name: Download k3s binary
  ansible.builtin.get_url:
    url: "{{ k3s_binary_url }}"
    dest: "{{ k3s_binary_download_path }}"
    mode: "0755"
    owner: root
    group: root
  tags: [k3s_server, install]

- name: Download official k3s checksum file for architecture
  ansible.builtin.get_url:
    url: "{{ k3s_checksum_url }}"
    dest: "{{ k3s_checksum_download_path }}"
    mode: "0644"
    owner: root
    group: root
  tags: [k3s_server, install]

- name: Extract expected checksum for k3s binary
  ansible.builtin.command:
    argv:
      - awk
      - -v
      - "asset={{ k3s_binary_asset }}"
      - '$2 == asset || $2 == ("./" asset) || $2 ~ ("/" asset "$") {print $1; exit}'
      - "{{ k3s_checksum_download_path }}"
  register: k3s_expected_checksum
  changed_when: false
  tags: [k3s_server, install]

- name: Assert expected k3s checksum was extracted
  ansible.builtin.assert:
    that:
      - k3s_expected_checksum.stdout | trim | length == 64
    fail_msg: >-
      Failed to extract expected checksum for asset {{ k3s_binary_asset }}
      from {{ k3s_checksum_download_path }}.
  tags: [k3s_server, install]

- name: Verify downloaded k3s binary checksum
  ansible.builtin.command:
    argv:
      - sha256sum
      - "{{ k3s_binary_download_path }}"
  register: k3s_actual_checksum
  changed_when: false
  tags: [k3s_server, install]

- name: Assert downloaded k3s binary checksum matches expected
  ansible.builtin.assert:
    that:
      - (k3s_actual_checksum.stdout.split()[0] | lower) == (k3s_expected_checksum.stdout | trim | lower)
    fail_msg: >-
      Downloaded k3s binary checksum mismatch.
      expected={{ k3s_expected_checksum.stdout | trim }}
      actual={{ k3s_actual_checksum.stdout.split()[0] | default('') }}
  tags: [k3s_server, install]

- name: Install verified k3s binary
  ansible.builtin.copy:
    src: "{{ k3s_binary_download_path }}"
    dest: "{{ k3s_binary_install_path }}"
    remote_src: true
    owner: root
    group: root
    mode: "0755"
  tags: [k3s_server, install]

- name: Download k3s install script
  ansible.builtin.get_url:
    url: "{{ k3s_install_script_url }}"
    dest: /tmp/get-k3s.sh
    mode: "0755"
    owner: root
    group: root
  tags: [k3s_server, install]

- name: Build k3s exec args
  ansible.builtin.set_fact:
    k3s_server_exec_args: >-
      {{
        (['server'] + k3s_server_extra_args) | join(' ')
      }}
  changed_when: false
  tags: [k3s_server, install]

- name: Install or update k3s server
  ansible.builtin.command:
    cmd: /tmp/get-k3s.sh
  environment:
    INSTALL_K3S_SKIP_DOWNLOAD: "true"
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    INSTALL_K3S_EXEC: "{{ k3s_server_exec_args }}"
  register: k3s_install_result
  changed_when: false
  tags: [k3s_server, install]

- name: Ensure k3s service is enabled and started
  ansible.builtin.systemd:
    name: "{{ k3s_service_name }}"
    enabled: true
    state: started
    daemon_reload: true
  tags: [k3s_server, install]
